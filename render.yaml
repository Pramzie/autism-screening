services:
  - type: web
    name: spectrumsense-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MODEL_PATH
        value: model.h5
    # Free instance — spins down after 15 min of inactivity
    # Upgrade to Starter ($7/mo) for always-on
    plan: free
